[bar]
order = [ "default" ]

    [bar.default]
    auto_hide = false
    background_opacity = 1.0
    border = "outline"
    border_width = 0.0
    capsule = true
    capsule_fill = "surface_variant"
    capsule_opacity = 1.0
    capsule_padding = 10.0
    capsule_thickness = 0.69999998807907104
    center = [ "audio_visualizer" ]
    contact_shadow = false
    enabled = true
    end = [ "tray", "notifications", "recorder_3", "group:g2", "group:g1", "session" ]
    font_weight = 500
    layer = "top"
    margin_edge = 0
    margin_ends = 0
    padding = 18
    panel_overlap = 1
    position = "top"
    radius = 16
    radius_bottom_left = -16
    radius_bottom_right = -16
    radius_top_left = 0
    radius_top_right = 0
    reserve_space = true
    scale = 1.0
    shadow = true
    start = [ "workspaces", "Clock_Date" ]
    thickness = 38
    widget_spacing = 8

        [[bar.default.capsule_group]]
        fill = "surface_variant"
        id = "g1"
        members = [ "battery", "network", "bluetooth" ]
        opacity = 1.0
        padding = 10.0

        [[bar.default.capsule_group]]
        fill = "surface_variant"
        id = "g2"
        members = [ "volume", "brightness" ]
        opacity = 1.0
        padding = 10.0

